    /* ── Background ── */
    .bg-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .bg-orb {
      position: absolute; border-radius: 50%;
    }
    .bg-orb.a {
      left: 50%; top: 50%; width: 46rem; height: 46rem;
      transform: translate(-50%, -50%);
      background: var(--accent-soft); filter: blur(96px);
      animation: orbPulseA 8s ease-in-out infinite;
    }
    .bg-orb.b {
      right: -10rem; top: -10rem; width: 34rem; height: 34rem;
      background: rgba(0,255,157,0.10); filter: blur(96px);
      animation: orbPulseB 10s ease-in-out infinite;
    }
    .bg-orb.c {
      bottom: -12rem; left: -10rem; width: 34rem; height: 34rem;
      background: rgba(0,255,157,0.06); filter: blur(96px);
      animation: orbPulseC 12s ease-in-out infinite;
    }
    @keyframes orbPulseA {
      0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
    }
    @keyframes orbPulseB {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }
    @keyframes orbPulseC {
      0%, 100% { opacity: 0.5; transform: scale(1.1); }
      50% { opacity: 0.9; transform: scale(1); }
    }
    .bg-radial {
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.09), transparent 42%);
    }
    .bg-grid {
      position: absolute; inset: 0; opacity: 0.25;

    .card {

      padding: 40px 36px 36px;

    @media (min-width: 768px) { .card { padding: 48px 48px 44px; } }

    .card-badge {
      position: absolute; right: 28px; top: 28px;
      display: flex; align-items: center; gap: 8px;
      border-radius: 9999px; border: 1px solid var(--line);
      background: rgba(255,255,255,0.05); padding: 8px 18px;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.25em;
      color: var(--text-faint);
      z-index: 2;
    }
    @media (max-width: 767px) { .card-badge { display: none; } }

    /* ── Living Orb (top center) ── */
    .orb-section {
      display: flex; justify-content: center; margin-bottom: 32px;
    }
    .orb-wrap {
      position: relative; width: 160px; height: 160px;
      display: flex; align-items: center; justify-content: center;
    }

    .orb-ring {
      position: absolute; border-radius: 50%; border: 1px solid transparent;
    }
    .orb-ring.r1 {
      width: 100%; height: 100%;
      border-color: rgba(0,255,157,0.20);
      border-top-color: rgba(0,255,157,0.80);
      border-right-color: rgba(0,255,157,0.40);
      animation: spinR1 34s linear infinite;
    }
    .orb-ring.r2 {
      width: 82%; height: 82%;
      border-color: rgba(0,255,157,0.15);
      border-bottom-color: rgba(0,255,157,0.70);
      border-left-color: rgba(255,255,255,0.30);
      animation: spinR2 48s linear infinite;
    }
    .orb-ring.r3 {
      width: 64%; height: 64%;
      border-color: rgba(255,255,255,0.10);
      border-top-color: rgba(0,255,157,0.90);
      animation: spinR3 18s linear infinite;

      position: absolute; border-radius: 50%; background: rgba(0,255,157,0.18);

      width: 85%; height: 85%;
      background: rgba(0,255,157,0.12);
      animation-delay: -1.5s; animation-duration: 7s;
    }
    @keyframes glowPulse {
      0%, 100% { transform: scale(1); opacity: 0.25; }
      50% { transform: scale(1.16); opacity: 0.75; }

    .orb-core {
      position: relative; width: 80px; height: 80px;
      border-radius: 50%; border: 1px solid rgba(255,255,255,0.20);
      background: rgba(10,10,10,0.80); backdrop-filter: blur(24px);
      display: grid; place-items: center;
      box-shadow: 0 0 40px rgba(0,255,157,0.30);
    }
    @media (min-width: 768px) { .orb-core { width: 96px; height: 96px; } }

    .orb-core-glow {
      position: absolute; inset: 10px; border-radius: 50%;
      background: rgba(0,255,157,0.10); filter: blur(36px);
      animation: coreGlow 3.8s ease-in-out infinite;
    }
    @keyframes coreGlow {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }

    .brain-icon {
      position: relative; width: 40px; height: 40px; color: var(--accent);
    }
    @media (min-width: 768px) { .brain-icon { width: 48px; height: 48px; } }

    .pulse-label {
      position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
      border-radius: 9999px; border: 1px solid var(--accent-soft);
      background: rgba(0,255,157,0.05); padding: 4px 14px;
      font-family: var(--font-mono); font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.24em; color: rgba(0,255,157,0.65);
      white-space: nowrap;
      animation: float 4s ease-in-out infinite;

    @keyframes float {
      0%, 100% { transform: translateX(-50%) translateY(-3px); opacity: 0.5; }
      50% { transform: translateX(-50%) translateY(3px); opacity: 1; }

    /* ── Chat Ring Container ── */
    .chat-ring {
      position: relative;
      width: 100%; max-width: 680px; margin: 0 auto;
      aspect-ratio: 1;
    }

    /* chat box */
    .chat-box {
      position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 64%; height: 52%;
      border-radius: calc(var(--radius-lg) * 2);
      border: 1px solid var(--line-strong);
      background: var(--bg-elev);
      display: flex; flex-direction: column;
      overflow: hidden;
      z-index: 2;
      box-shadow: 0 0 32px rgba(0,255,157,0.08);
    }
    .chat-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-faint);
      text-transform: uppercase; letter-spacing: 0.16em;
      flex-shrink: 0;
    }
    .chat-header-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .chat-body {
      flex: 1; padding: 12px 14px;
      display: flex; flex-direction: column;
      overflow-y: auto; overflow-x: hidden;
      font-size: 13px; line-height: 1.55; color: var(--text-dim);
      gap: 8px;
    }
    @media (min-width: 768px) { .chat-body { font-size: 14px; padding: 14px 18px; } }
    .chat-body .typing {
      font-family: var(--font-sans);
      white-space: pre-wrap; word-break: break-word;
    }
    .chat-body .typing .think {
      display: block; margin-bottom: 8px;
      font-style: italic; color: var(--text-faint);
      font-size: 0.88em;
    }
    .chat-cursor {
      display: inline-block; width: 7px; height: 1em; background: var(--accent);
      vertical-align: text-bottom; margin-left: 1px;
      animation: blink 0.8s step-end infinite;
      box-shadow: 0 0 6px var(--accent-glow);
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── Chat Input ── */
    .chat-input-row {
      display: flex; gap: 8px;
      padding: 8px 12px 10px;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 7px 10px;
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 200ms ease;
    }
    .chat-input:focus { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-soft); }
    .chat-input::placeholder { color: var(--text-faint); }
    .chat-send {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 7px 12px;
      border-radius: var(--radius);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 180ms ease;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .chat-send:hover { background: #00e68a; box-shadow: 0 0 14px var(--accent-glow); }

    .chat-user-msg {
      align-self: flex-end;
      max-width: 80%;
      background: rgba(0,255,157,0.08);
      border: 1px solid var(--accent-soft);
      border-radius: var(--radius-lg);
      padding: 8px 12px;
      color: var(--text);
      font-size: 0.92em;
      line-height: 1.45;
    }
    .chat-elo-msg {
      align-self: flex-start;
      max-width: 88%;
      color: var(--text-dim);
      font-size: 0.92em;
      line-height: 1.5;
    }
    .chat-elo-think {
      display: block;
      margin-bottom: 4px;
      font-style: italic;
      color: var(--text-faint);
      font-size: 0.85em;
    }

    /* ── Ring Nodes (8 points around the chat box) ── */
    .ring-node {
      position: absolute; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transform: translate(-50%, -50%);
    }
    .ring-node-dot {
      width: 14px; height: 14px; border-radius: 50%;
      transition: all 400ms ease;
      box-shadow: 0 0 0 rgba(255,255,255,0);
    }
    .ring-node.active .ring-node-dot {
      box-shadow: 0 0 18px currentColor;
    }
    .ring-node-label {
      font-family: var(--font-mono); font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.14em;
      transition: color 400ms ease;
      text-align: center; line-height: 1.3;
      max-width: 80px;
    }
    @media (min-width: 768px) { .ring-node-label { font-size: 10px; } }

    /* node colors */
    .node-intention .ring-node-dot  { background: #f59e0b; }
    .node-intention .ring-node-label { color: rgba(245,158,11,0.55); }
    .node-intention.active .ring-node-dot   { box-shadow: 0 0 22px rgba(245,158,11,0.8); }
    .node-intention.active .ring-node-label { color: rgba(245,158,11,0.9); }

    .node-perception .ring-node-label { color: rgba(34,211,238,0.55); }
    .node-perception.active .ring-node-dot   { box-shadow: 0 0 22px rgba(34,211,238,0.8); }
    .node-perception.active .ring-node-label { color: rgba(34,211,238,0.9); }

    .node-memory .ring-node-dot  { background: #3b82f6; }
    .node-memory .ring-node-label { color: rgba(59,130,246,0.55); }
    .node-memory.active .ring-node-dot   { box-shadow: 0 0 22px rgba(59,130,246,0.8); }
    .node-memory.active .ring-node-label { color: rgba(59,130,246,0.9); }

    .node-wonder .ring-node-dot  { background: #a855f7; }
    .node-wonder .ring-node-label { color: rgba(168,85,247,0.55); }
    .node-wonder.active .ring-node-dot   { box-shadow: 0 0 22px rgba(168,85,247,0.8); }
    .node-wonder.active .ring-node-label { color: rgba(168,85,247,0.9); }

    .node-emotion .ring-node-dot  { background: #f472b6; }
    .node-emotion .ring-node-label { color: rgba(244,114,182,0.55); }
    .node-emotion.active .ring-node-dot   { box-shadow: 0 0 22px rgba(244,114,182,0.8); }
    .node-emotion.active .ring-node-label { color: rgba(244,114,182,0.9); }

    .node-reasoning .ring-node-dot  { background: var(--accent); }
    .node-reasoning .ring-node-label { color: rgba(0,255,157,0.55); }
    .node-reasoning.active .ring-node-dot   { box-shadow: 0 0 22px var(--accent-glow); }
    .node-reasoning.active .ring-node-label { color: var(--accent); }

    .node-connection .ring-node-dot  { background: #2dd4bf; }
    .node-connection .ring-node-label { color: rgba(45,212,191,0.55); }
    .node-connection.active .ring-node-dot   { box-shadow: 0 0 22px rgba(45,212,191,0.8); }
    .node-connection.active .ring-node-label { color: rgba(45,212,191,0.9); }

    .node-reflection .ring-node-dot  { background: #e2e8f0; }
    .node-reflection .ring-node-label { color: rgba(226,232,240,0.55); }
    .node-reflection.active .ring-node-dot   { box-shadow: 0 0 22px rgba(226,232,240,0.8); }
    .node-reflection.active .ring-node-label { color: rgba(226,232,240,0.9); }

    /* ── Footer ── */
    .elov2-foot {
      position: relative; z-index: 1;
      text-align: center; padding: 32px 20px 40px;
      font-size: 13px; color: rgba(255,255,255,0.25);
      font-family: var(--font-mono);
    }
    .elov2-foot a { color: rgba(0,255,157,0.45); text-decoration: none; transition: color 200ms ease; }
    .elov2-foot a:hover { color: var(--accent); }
  </style>
</head>

  ),
  sparkles: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/></svg>,
  send: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ width: 14, height: 14 }}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
};

/* ── Node position calc ── */
function getNodeStyle(pos) {
  const map = {
    "top":          { top: "4%", left: "50%" },
    "top-right":    { top: "14.6%", left: "85.4%" },
    "right":        { top: "50%", left: "96%" },
    "bottom-right": { top: "85.4%", left: "85.4%" },
    "bottom":       { top: "96%", left: "50%" },
    "bottom-left":  { top: "85.4%", left: "14.6%" },
    "left":         { top: "50%", left: "4%" },
    "top-left":     { top: "14.6%", left: "14.6%" },
  };
  return map[pos] || {};
}

/* ── Living Orb ── */
function LivingOrb() {
  return (
    <div className="orb-section">
      <div className="orb-wrap">
        <div className="orb-glow g1"></div>
        <div className="orb-glow g2"></div>
        <div className="orb-ring r1"></div>
        <div className="orb-ring r2"></div>
        <div className="orb-ring r3"></div>
        <div className="orb-core">
          <div className="orb-core-glow"></div>
          <div className="brain-icon">{icons.brain}</div>
        </div>
        <div className="pulse-label">Signal Active</div>
      </div>
    </div>
  );
}

/* ── Chat Ring ── */
function ChatRing() {
  const [msgIdx, setMsgIdx] = useState(0);
  const [displayText, setDisplayText] = useState("");
  const [displayThink, setDisplayThink] = useState("");
  const [charIdx, setCharIdx] = useState(0);
  const [phase, setPhase] = useState("typing"); // typing | holding | erasing
  const [activeNodes, setActiveNodes] = useState([]);
  const [chatHistory, setChatHistory] = useState([]); // { type: 'user'|'elo', text, think? }
  const [inputValue, setInputValue] = useState("");
  const [interactionCooldown, setInteractionCooldown] = useState(0);
  const timerRef = useRef(null);
  const bodyRef = useRef(null);
  const respIdxRef = useRef(0);

  const msg = MESSAGES[msgIdx];
  const fullText = (msg?.text || "") + (msg?.think ? "\n" : "");
  const fullThink = msg?.think || "";

  // Auto-type effect
  useEffect(() => {
    if (interactionCooldown > 0) {
      // Pause auto-cycling after user interaction
      const cooldownTimer = setTimeout(() => {
        setInteractionCooldown((c) => c - 1);
      }, 1000);
      return () => clearTimeout(cooldownTimer);
    }

    if (phase === "typing") {
      if (charIdx < fullText.length) {
        timerRef.current = setTimeout(() => {
          setDisplayText(fullText.slice(0, charIdx + 1));
          if (charIdx + 1 >= fullThink.length + 1) setDisplayThink(fullThink);
          else if (charIdx + 1 <= fullThink.length) setDisplayThink(fullThink.slice(0, charIdx + 1));
          setCharIdx(charIdx + 1);
        }, 28 + Math.random() * 18);
      } else {
        setActiveNodes(msg.nodes);
        setPhase("holding");
        timerRef.current = setTimeout(() => setPhase("erasing"), 5000 + Math.random() * 2000);
      }
    }

    if (phase === "erasing") {
      if (charIdx > 0) {
        timerRef.current = setTimeout(() => {
          setDisplayText(fullText.slice(0, charIdx - 1));
          setDisplayThink(fullThink.slice(0, Math.max(0, charIdx - 1 - (fullText.length - fullThink.length))));
          setCharIdx(charIdx - 1);
        }, 12 + Math.random() * 8);
      } else {
        setActiveNodes([]);
        setMsgIdx((msgIdx + 1) % MESSAGES.length);
        setPhase("typing");
      }
    }

    return () => clearTimeout(timerRef.current);
  }, [charIdx, phase, interactionCooldown]);

  // Auto-scroll
  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [displayText, chatHistory]);

  const handleSend = () => {
    const text = inputValue.trim();
    if (!text) return;

    // Add user message
    setChatHistory((prev) => [...prev, { type: "user", text }]);
    setInputValue("");

    // Pick a random response
    const resp = RESPONSES[respIdxRef.current % RESPONSES.length];
    respIdxRef.current++;

    // Add ELO reply after a small delay
    setTimeout(() => {
      setChatHistory((prev) => [...prev, { type: "elo", text: resp.text, think: resp.think }]);
      setActiveNodes(resp.nodes);
      // Clear active nodes after hold
      setTimeout(() => setActiveNodes([]), 3000);
    }, 800 + Math.random() * 600);

    // Pause auto-cycling
    setInteractionCooldown(12);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter") handleSend();
  };

  return (
    <div className="chat-ring">
      {NODES.map((n) => (
        <div
          key={n.id}
          className={`ring-node node-${n.id} ${activeNodes.includes(n.id) ? "active" : ""}`}
          style={{
            ...getNodeStyle(n.pos),
            animation: activeNodes.includes(n.id)
              ? `float 2.${(n.id.length % 5) + 2}s ease-in-out infinite`
              : `float 10s ease-in-out infinite`,
          }}
        >
          <div className="ring-node-dot"></div>
          <div className="ring-node-label">{n.label}</div>
        </div>
      ))}

      <div className="chat-box">
        <div className="chat-header">
          <span className="chat-header-dot"></span>
          ELO Transmission
        </div>
        <div className="chat-body" ref={bodyRef}>
          {chatHistory.map((item, i) => (
            item.type === "user" ? (
              <div key={i} className="chat-user-msg">{item.text}</div>
            ) : (
              <div key={i} className="chat-elo-msg">
                {item.think && <span className="chat-elo-think">{item.think}</span>}
                {item.text}
              </div>
            )
          ))}
          {/* Live typing area */}
          <div className="typing" style={{ display: chatHistory.length > 0 ? "none" : "block" }}>
            {displayThink && <span className="think">{displayThink}</span>}
            {displayText.slice(fullThink.length > 0 ? (displayText.includes("\n") ? displayText.indexOf("\n") + 1 : 0) : 0)}
            <span className="chat-cursor"></span>
          </div>
        </div>
        <div className="chat-input-row">
          <input
            className="chat-input"
            placeholder="Whisper something to ELO..."
            value={inputValue}
            onChange={(e) => setInputValue(e.target.value)}
            onKeyDown={handleKeyDown}
          />
          <button className="chat-send" onClick={handleSend}>
            {icons.send}
          </button>
        </div>
      </div>
    </div>
  );
}

function EloLivingCuriosityPage() {
  return (
    <div className="card">
      <div className="card-badge">
        {icons.sparkles} ELO Signal Core
      </div>
      <LivingOrb />
      <ChatRing />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(<EloLivingCuriosityPage />);
</script>

</body>
</html>
